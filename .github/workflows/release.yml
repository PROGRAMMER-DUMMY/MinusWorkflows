name: Release

# Triggered when you push a version tag: git tag v2.0.1 && git push --tags
on:
  push:
    tags: ['v*']

jobs:

  # ── Gate: run unit tests before publishing anything ───────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test-pipeline

  # ── Docker: build each platform natively, then merge into one manifest ─────────
  # Native runners (~4 min each) vs QEMU emulation (~2 hr for arm64 Rust builds).

  docker-amd64:
    name: Build Docker (amd64)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push (amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./ocr_memory_rust
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  docker-arm64:
    name: Build Docker (arm64)
    runs-on: ubuntu-24.04-arm
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push (arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./ocr_memory_rust
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  docker-merge:
    name: Merge Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker-amd64, docker-arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ steps.meta.outputs.version }} \
            --tag ${{ env.IMAGE }}:$(echo '${{ steps.meta.outputs.version }}' | cut -d. -f1-2) \
            --tag ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:${{ github.ref_name }}-amd64 \
            ${{ env.IMAGE }}:${{ github.ref_name }}-arm64

  # ── npm: publish package to npmjs.com ────────────────────────────────────────
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test   # publish even if Docker is still building
    permissions:
      contents: read
      id-token: write   # required for OIDC Trusted Publishing — no stored secret needed

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      # Strip the leading 'v' from the tag (v2.0.1 → 2.0.1) and sync package.json
      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish
        run: npm publish --access public --provenance
